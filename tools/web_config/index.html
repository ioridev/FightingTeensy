<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FightingTeensy Config</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>FightingTeensy Config</h1>
        <p id="status">Disconnected</p>
      </div>
      <div class="connection">
        <select id="portSelect" aria-label="Serial port"></select>
        <button id="refreshPorts" type="button">Refresh Ports</button>
        <button id="ping" type="button">Ping</button>
        <button id="load" type="button">Load Settings</button>
      </div>
    </header>

    <main>
      <section class="panel workflow-panel">
        <div class="workflow-actions" aria-label="Main workflow">
          <button id="applyButtonPins" type="button">1 Apply Mapping</button>
          <button id="save" type="button" class="primary">2 Save EEPROM</button>
          <button id="returnXinput" type="button">3 Return XInput</button>
        </div>
        <div class="workflow-tools">
          <span id="monitorState" class="monitor-state">Monitor stopped</span>
          <button id="stopAllMonitors" type="button">Stop All Monitors</button>
          <button id="flashConfig" type="button">Flash Config Firmware</button>
        </div>
      </section>

      <section class="panel live-panel">
        <div class="panel-title">
          <h2>Live Hall Values</h2>
          <div class="actions">
            <button id="sample" type="button">Sample</button>
            <button id="monitor" type="button">Monitor</button>
            <button id="calRest" type="button">Cal Rest</button>
          </div>
        </div>
        <div class="sample-grid" id="sampleGrid"></div>
      </section>

      <section class="panel button-panel">
        <div class="panel-title">
          <h2>Button Pins</h2>
          <div class="actions">
            <button id="scanPins" type="button">Scan Pins</button>
            <button id="monitorPins" type="button">Monitor Pins</button>
          </div>
        </div>
        <div class="pin-scan" id="pinScan"></div>
        <div class="button-pin-grid" id="buttonPinGrid"></div>
      </section>

      <section class="panel tester-panel">
        <div class="panel-title">
          <h2>XInput Tester</h2>
          <div class="actions">
            <button id="sampleButtons" type="button">Sample Buttons</button>
            <button id="monitorButtons" type="button">Monitor Buttons</button>
          </div>
        </div>
        <div class="arcade-tester" id="arcadeTester"></div>
      </section>

      <section class="direction-grid" id="directionGrid"></section>

      <section class="panel log-panel">
        <div class="panel-title">
          <h2>Log</h2>
          <button id="clearLog" type="button">Clear</button>
        </div>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
